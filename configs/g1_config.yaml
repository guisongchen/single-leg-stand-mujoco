simulation:
  dt: 0.002  # 500 Hz, stable for humanoid contact dynamics
  gravity: [0.0, 0.0, -9.81]
  friction: 0.8
  model_path: "/home/ccc/projects/single_leg_stand_mujoco/models/scene_23dof_clean.xml"

robot:
  # Floating base is excluded; these are the 23 actuated joints in qpos order
  joint_names:
    - left_hip_pitch_joint
    - left_hip_roll_joint
    - left_hip_yaw_joint
    - left_knee_joint
    - left_ankle_pitch_joint
    - left_ankle_roll_joint
    - right_hip_pitch_joint
    - right_hip_roll_joint
    - right_hip_yaw_joint
    - right_knee_joint
    - right_ankle_pitch_joint
    - right_ankle_roll_joint
    - waist_yaw_joint
    - left_shoulder_pitch_joint
    - left_shoulder_roll_joint
    - left_shoulder_yaw_joint
    - left_elbow_joint
    - left_wrist_roll_joint
    - right_shoulder_pitch_joint
    - right_shoulder_roll_joint
    - right_shoulder_yaw_joint
    - right_elbow_joint
    - right_wrist_roll_joint

  body_names:
    pelvis: pelvis
    torso: torso_link
    left_foot: left_ankle_roll_link
    right_foot: right_ankle_roll_link

  # Initial standing pose (radians) — centred CoM over support polygon.
  # hip=-0.1 rad leans torso back to offset the heavy upper-body mass.
  # Knee and ankle angles are kept moderate so all foot spheres touch ground.
  initial_qpos:
    left_hip_pitch_joint: -0.1
    left_hip_roll_joint: 0.0
    left_hip_yaw_joint: 0.0
    left_knee_joint: 0.15
    left_ankle_pitch_joint: -0.08
    left_ankle_roll_joint: 0.0
    right_hip_pitch_joint: -0.1
    right_hip_roll_joint: 0.0
    right_hip_yaw_joint: 0.0
    right_knee_joint: 0.15
    right_ankle_pitch_joint: -0.08
    right_ankle_roll_joint: 0.0
    waist_yaw_joint: 0.0
    left_shoulder_pitch_joint: 0.0
    left_shoulder_roll_joint: 0.0
    left_shoulder_yaw_joint: 0.0
    left_elbow_joint: 0.0
    left_wrist_roll_joint: 0.0
    right_shoulder_pitch_joint: 0.0
    right_shoulder_roll_joint: 0.0
    right_shoulder_yaw_joint: 0.0
    right_elbow_joint: 0.0
    right_wrist_roll_joint: 0.0

  # Initial pelvis position [x, y, z, qw, qx, qy, qz]
  initial_base_pos: [0.0, 0.0, 0.793, 1.0, 0.0, 0.0, 0.0]

control:
  # Simple PD gains for joint-space tracking (used in test scripts)
  kp: 80.0
  kd: 5.0

  # Phase 1: WBC gains
  stance_kp_joint: 100.0
  stance_kd_joint: 8.0
  stance_kp_com: 120.0
  stance_kd_com: 20.0
  stance_kp_pelvis: 80.0
  stance_kd_pelvis: 12.0

  # WBC task priority weights
  wbc_w_foot: 1000.0
  wbc_w_com: 100.0
  wbc_w_pelvis: 50.0
  wbc_w_posture: 1.0
  wbc_w_swing: 10.0
  wbc_reg: 0.01
  wbc_reg_lambda: 0.001
  wbc_max_contact_force: 5000.0
  wbc_tau_limit: 100.0       # QP actuator torque bound (N·m); null = disabled

transition:
  # Which foot becomes the support foot during single-leg stance
  support_foot: "left"   # "left" or "right"

  # Phase timings (seconds)
  t_bipedal: 1.0         # Hold stable bipedal stance before shifting
  t_weight_shift: 2.5    # Move CoM over support foot
  t_single_leg: 30.0     # Minimum single-leg hold time

  # Swing foot trajectory
  swing_lift_height: 0.03    # metres above ground (low = less disturbance)
  swing_rise_duration: 1.0   # seconds to reach full lift

  # Swing foot tracking gains (PD on acceleration)
  swing_kp: 50.0
  swing_kd: 15.0

  # State-switch thresholds
  swing_unload_force: 20.0   # switch to single leg when swing fz drops below this (N)
  com_settle_tolerance: 0.05 # CoM must be within this distance of target before switch
  cp_margin: 0.02           # inward margin on support rectangle for capture point (m)
  weight_shift_timeout: 15.0 # max time in WEIGHT_SHIFT before forced switch (s)

  # Single-leg balance tuning
  foot_kd: 40.0              # support-foot velocity damping to prevent slip
  pelvis_kp: 30.0            # pelvis orientation PD proportional gain
  pelvis_kd: 5.0             # pelvis orientation PD derivative gain
  pelvis_weight: 5.0         # QP weight for pelvis orientation task
  single_leg_w_com: 200.0    # boosted CoM weight during single-leg phase
  single_leg_w_cam: 200.0    # boosted CAM weight during single-leg phase
  single_leg_w_posture: 0.01 # reduced posture weight during single-leg phase
